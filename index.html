<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KT_kito Server</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0a0a0a,#111133,#1a1a1a);
    color:white;
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

h1{
    font-size:55px;
    margin-bottom:10px;
    text-shadow:0 0 20px #5865F2;
}

.subtitle{
    color:#ccc;
    margin-bottom:35px;
    font-size:20px;
}

.btn{
    display:block;
    width:320px;
    margin:15px auto;
    padding:18px;
    font-size:22px;
    font-weight:bold;
    text-decoration:none;
    color:white;
    border-radius:15px;
    transition:0.25s;
}

.btn:hover{
    transform:scale(1.05);
}

.download{ background:#5865F2; }
.youtube{ background:#ff0000; }
.discord{ background:#7289da; }
.roblox{ background:#111; border:2px solid white; }

.section{
    margin-top:90px;
}

.card{
    background:rgba(255,255,255,0.07);
    padding:30px;
    margin:20px auto;
    max-width:700px;
    border-radius:20px;
}

.card h2{
    font-size:34px;
    margin-bottom:15px;
}

.small-btn{
    display:inline-block;
    padding:14px 28px;
    margin:10px;
    text-decoration:none;
    color:white;
    background:#00aa66;
    border-radius:12px;
    font-size:20px;
}

.game-btn{
    background:#111;
    border:2px solid white;
}

iframe{
    margin-top:30px;
    border-radius:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>KT_kito Server</h1>
<p class="subtitle">公式アプリ＆ゲーム配布ページ</p>

<a class="btn download" href="#downloads">📦 アプリをダウンロード</a>

<a class="btn youtube" href="https://youtube.com/@kt_kito?si=f7ofmYQEkTtviN78" target="_blank">
▶ YouTubeチャンネルへ
</a>

<a class="btn discord" href="#discord">
💬 Discordへ
</a>

<a class="btn roblox" href="#games">
🎮 Robloxゲームへ
</a>


<div id="downloads" class="section">

<div class="card">
<h2>Global_Key</h2>
<a class="small-btn" href="https://drive.google.com/file/d/18Id3kCobOWj4ofIFqXk4bIMnBZup8ILd/view?usp=drive_link">⬇ ダウンロード</a>
</div>

<div class="card">
<h2>Clean_Temp</h2>
<a class="small-btn" href="https://drive.google.com/file/d/1_Jn1UC-WdTprtZjQPDDHXPFnKsEqQOme/view?usp=drive_link">⬇ ダウンロード</a>
</div>

</div>


<div id="games" class="section">

<div class="card">
<h2>Monster_Clicker</h2>
<a class="small-btn game-btn" href="https://www.roblox.com/ja/games/122747307957838/Monster-Clicker" target="_blank">
🎮 プレイする
</a>
</div>

<div class="card">
<h2>無限呪域</h2>
<a class="small-btn game-btn" href="https://www.roblox.com/ja/games/82094417302229/unnamed" target="_blank">
🎮 プレイする
</a>
</div>

</div>


<div id="discord" class="section">

<h2 style="font-size:40px;">Discord Community</h2>

<iframe src="https://discord.com/widget?id=1199684104812245062&theme=dark"
width="350"
height="500"
allowtransparency="true"
frameborder="0"
sandbox="allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
</iframe>

</div>

</div>

</body>
</html>
